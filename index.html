<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Toggle</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page" id="page">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>

      <div class="card">
        <div class="icon-wrap" id="iconWrap">☀️</div>
        <h2 class="heading" id="heading">Light Mode</h2>
        <p class="sub" id="sub">Bright, clean and energetic</p>

        <div class="toggle-row">
          <span class="toggle-label active" id="lightLbl">Light</span>
          <div class="switch" id="sw" onclick="toggle()">
            <div class="switch-knob"></div>
          </div>
          <span class="toggle-label inactive" id="darkLbl">Dark</span>
        </div>

        <button class="btn" onclick="toggle()">Toggle Theme</button>
        <div class="mode-badge" id="badge">● Light mode active</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
